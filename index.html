<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EXACTO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-container">

<h1>EXACTO</h1>
<p class="project-tag">TEAM 2 SIP PROJECT</p>

<div class="card">

<label>Category</label>
<select id="category">
<option value="">-- Select Category --</option>
</select>

<label>Item</label>
<select id="item">
<option value="">-- Select Item --</option>
</select>

<label>Price (₹)</label>
<input type="number" id="price" placeholder="Enter price">

<div id="quantityField" style="display:none;">
<label>Quantity</label>
<input type="number" id="quantity">
</div>

<div id="weightField" style="display:none;">
<label>Weight (KG)</label>
<input type="number" id="weight">
</div>

<label>Item Discount (%) (Optional)</label>
<input type="number" id="itemDiscount" placeholder="0 - 100">

<label>Offer (Optional)</label>
<select id="offer">
<option value="none">No Offer</option>
<option value="20">20% OFF</option>
<option value="30">30% OFF</option>
<option value="50">50% OFF</option>
<option value="b1g1">Buy 1 Get 1</option>
<option value="b2g2">Buy 2 Get 2</option>
</select>

<button onclick="addItem()">Add Item</button>

</div>

<div class="card">

<h3 class="cart-heading">CART ITEMS</h3>
<div id="cartList"></div>

<button onclick="calculateFinalBill()">Calculate Final Bill</button>

</div>

<div id="result" class="result-card"></div>

</div>

<script src="script.js"></script>

</body>
</html>
